<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login | Keysons</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #eef6ff, #f8fbff);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .login-box {
      width: min(460px, 92vw);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
      padding: 36px;
    }
    .login-box h2 {
      margin: 0 0 8px;
      color: #0f172a;
      font-size: 28px;
    }
    .login-box p {
      margin: 0 0 24px;
      color: #64748b;
      font-size: 14px;
    }
    label {
      display: block;
      font-size: 14px;
      color: #334155;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      margin-bottom: 16px;
      font-size: 14px;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #0b5ed7; }
    .error {
      display: none;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
      font-size: 14px;
    }
    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Client Access</h2>
    <p>Private area for authorized clients only.</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="client@company.com" required />
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required />
      <button type="submit">Login</button>
      <div class="error" id="errorMsg">Invalid email or password.</div>
    </form>
    <div class="note">This page is not linked from the public website navigation.</div>
  </div>

  <script>
    const VALID_EMAIL = 'client@keysons.com';
    const VALID_PASSWORD = 'Keysons@2026';

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (email === VALID_EMAIL && password === VALID_PASSWORD) {
        localStorage.setItem('clientAccess', 'true');
        localStorage.setItem('clientEmail', email);
        window.location.href = 'client-dashboard.html';
      } else {
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
